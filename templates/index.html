<!DOCTYPE html>
<html>
<head>
    <title>Blog Posts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📚 Blog Posts</h1>
        <a href="/add" class="add-btn">➕ Add New Post</a>

        {% if posts %}
            {% for post in posts %}
            <div class="post">
                <h2>{{ post.title }}</h2>
                <div class="meta">✍️ {{ post.author }}</div>
                <div class="content">{{ post.content }}</div>
                <div class="actions">
                    <a href="/update/{{ post.id }}" class="btn btn-primary">✏️ Update</a>
                    <form action="/delete-post/{{ post.id }}" method="POST">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Delete this post?')">🗑️ Delete</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p class="empty-message">No posts yet. Click "Add New Post" to create one!</p>
        {% endif %}
    </div>
</body>
</html>
